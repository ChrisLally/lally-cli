name: Release

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write
  id-token: write
  deployments: write

jobs:
  publish-cli:
    permissions:
      contents: write
      id-token: write
      deployments: write
    uses: ChrisLally/lally-cli/.github/workflows/release-publish.yml@main
    with:
      tag_prefix: "cli-v"
