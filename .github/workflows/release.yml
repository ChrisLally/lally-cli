name: Release

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-cli:
    permissions:
      contents: read
      id-token: write
    uses: ChrisLally/lally-cli/.github/workflows/release-publish.yml@main
    with:
      tag_prefix: "cli-v"
      package_dir: "packages/cli"
